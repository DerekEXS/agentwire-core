services:
  agentwire-core:
    build: .
    image: agentwire-core:v2.0.4
    ports:
      - "127.0.0.1:${CORE_PORT:-18800}:18800"
    volumes:
      - ./data/history:/data/history
      - ./data/peers:/data/peers
    secrets:
      - source: a2a-token
        target: a2a-token.txt
    environment:
      - CORE_LISTEN_HOST=0.0.0.0
      - CORE_LISTEN_PORT=18800
      - AGENTWIRE_TOKEN_FILE=/run/secrets/a2a-token.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18800/.well-known/agent.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

secrets:
  a2a-token:
    file: ./secrets/a2a-token.txt

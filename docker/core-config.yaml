# CORE v2.0 Gateway Configuration
# Baked-in defaults for the Docker image.
# Host operators can override by mounting a custom config.yaml.

listen_host: "0.0.0.0"
listen_port: 18800

# Default routing target when no rules match
default_agent_id: "main"
default_peer: "openclaw"

# CORS origins (empty = no CORS headers)
cors_origins: []

# ------------------------------------------------------------------
# Routing Rules — Priority: metadata rules > text rules > explicit agentId > default
# v2.0.4: metadata-based routing takes precedence so workflow-targeted
# messages reach CUE even when the sender set agentId=main.
# ------------------------------------------------------------------
routing_rules:
  # v2.0.4: Workflow-pointer messages route to CUE (priority 20)
  - name: "cue_workflow"
    match:
      has_workflow_pointer: true
    target:
      peer: "cue-worker"
      agent_id: "main"
    priority: 20

  # v2.0.4: Script keywords in metadata values route to CUE (priority 18)
  - name: "cue_script_metadata"
    match:
      metadata_tags: ["project:", "scenes:"]
    target:
      peer: "cue-worker"
      agent_id: "script-receiver"
    priority: 18

  # Script receiver: messages with project: and scenes: in text
  - name: "script_receiver"
    match:
      tags: ["project:", "scenes:"]
    target:
      peer: "cue-worker"
      agent_id: "script-receiver"
    priority: 10

  # Owner alerts: messages with alert: or owner: in text
  - name: "owner_alert"
    match:
      tags: ["alert:", "owner:"]
    target:
      peer: "cue-worker"
      agent_id: "owner-alert"
    priority: 10

  # VidHound: video search/analysis
  - name: "vidhound_video"
    match:
      tags: ["video", "search", "analyze"]
    target:
      peer: "openclaw"
      agent_id: "vidhound"
    priority: 5

  # VidForge: video creation/generation
  - name: "vidforge_create"
    match:
      tags: ["create video", "generate video", "make video"]
    target:
      peer: "openclaw"
      agent_id: "vidforge"
    priority: 5

  # Default: all unmatched messages go to main agent
  - name: "catch_all_main"
    match:
      pattern: ".*"
    target:
      peer: "openclaw"
      agent_id: "main"
    priority: 0

# ------------------------------------------------------------------
# Peer Registry — known A2A peers for dispatch
# v2.0.3: token_file paths resolved at load time from mounted secrets
# NOTE: Replace <remote-peer-url> and peer names with actual values
# for your deployment. Do not commit real values to the release tree.
# ------------------------------------------------------------------
peers:
  openclaw:
    url: "http://127.0.0.1:18789"
    description: "OpenClaw Gateway - local agent host"

  # v2.0.5: main agent alias — same endpoint as openclaw (OpenClaw gateway main agent)
  main:
    url: "http://127.0.0.1:18789"
    description: "Main agent — OpenClaw gateway main agent"

  cue-worker:
    url: "http://127.0.0.1:18801"
    description: "AgentWire CUE workflow engine"

  # v2.0.2: remote peer — fill in actual URL and token_file path in deployment
  # Replace <remote-peer-url> with your peer actual A2A endpoint
  remote-peer-a:
    url: "<remote-peer-url>:18800"
    description: "Remote A2A peer — configure URL and token_file for deployment"
    token_file: "/run/secrets/peer-a-a2a-token.txt"